---
apiVersion: 1

datasources:
  - name: Prometheus
    uid: webstore-metrics
    type: prometheus
    url: http://prometheus:9090
    editable: true
    isDefault: true
    jsonData:
      # Align Prometheus data source time interval with the OTel SDKs' export interval (see OTEL_METRIC_EXPORT_INTERVAL)
      timeInterval: "60s"
      exemplarTraceIdDestinations:
        - datasourceUid: webstore-traces
          name: trace_id

        - url: http://localhost:8080/jaeger/ui/trace/$${__value.raw}
          name: trace_id
          urlDisplayLabel: View in Jaeger UI

        - datasourceUid: webstore-tempo
          name: trace_id

        - url: /grafana/explore?left={"datasource":"webstore-tempo","queries":[{"refId":"A","queryType":"traceql","query":"$${__value.raw}"}],"range":{"from":"now-1h","to":"now"}}
          name: trace_id
          urlDisplayLabel: View in Tempo
